<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>مشويات الرافدين</title>
</head>
<body>

   <header class="hero">
    <img src="images/1.jpg" alt="لوجو الرافدين" class="header-img">
   <!-- استبدلي الروابط القديمة بهذا فقط -->
<div class="categories">
    <a href="#appetizers">المقبلات</a>
    <a href="#grills">المشويات</a>
</div>
</header>

    <main id="menu">
        <section id="appetizers">
            <h2 class="section-title">المقبلات</h2>
            <div class="item">
                <img src="images/2.jpeg" alt="مقبلات">
                <div class="info">
                    <h3>مقبلات الرافدين</h3>
                    <p>20 ر.س</p>
                </div>
                <button onclick="addToCart('مقبلات الرافدين', 20)">+</button>
            </div>
        </section>

        <section id="grills">
            <h2 class="section-title">المشويات</h2>
            <div class="item">
                <img src="images/3.jpg" alt="عرايس">
                <div class="info">
                    <h3>عرايس</h3>
                    <p>25 ر.س</p>
                </div>
                <button onclick="addToCart('عرايس', 25)">+</button>
            </div>
        </section>
    </main>

    <div id="cart-float" onclick="toggleCart()">🛒 السلة (<span id="count">0</span>)</div>

    <div id="cart-modal" class="hidden">
        <h3>سلة الطلبات</h3>
        <div id="cart-items"></div>
        <p>الإجمالي: <span id="total">0</span> ر.س</p>
        <button onclick="sendToWhatsApp()" class="whatsapp-btn">إرسال للواتساب</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
